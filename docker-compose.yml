name: presence-timeline

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: presence-timeline-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: presence_timeline
      POSTGRES_USER: presence_timeline
      POSTGRES_PASSWORD: presence_timeline
    ports:
      - "${PRESENCE_TIMELINE_DB_PORT:-5432}:5432"
    volumes:
      - presence-timeline-postgis-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U presence_timeline -d presence_timeline"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: ./backend
    container_name: presence-timeline-migrator
    environment:
      PRESENCE_TIMELINE_DATABASE_URL: ${PRESENCE_TIMELINE_DATABASE_URL:-postgresql+psycopg://presence_timeline:presence_timeline@db:5432/presence_timeline}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: alembic upgrade head

  api:
    build:
      context: ./backend
    container_name: presence-timeline-api
    restart: unless-stopped
    environment:
      PRESENCE_TIMELINE_DATABASE_URL: ${PRESENCE_TIMELINE_DATABASE_URL:-postgresql+psycopg://presence_timeline:presence_timeline@db:5432/presence_timeline}
      PRESENCE_TIMELINE_APP_NAME: ${PRESENCE_TIMELINE_APP_NAME:-Presence Timeline API}
      PRESENCE_TIMELINE_APP_VERSION: ${PRESENCE_TIMELINE_APP_VERSION:-0.1.0}
      PRESENCE_TIMELINE_API_V1_PREFIX: ${PRESENCE_TIMELINE_API_V1_PREFIX:-/api/v1}
      PRESENCE_TIMELINE_RETENTION_DAYS: ${PRESENCE_TIMELINE_RETENTION_DAYS:-7}
      PRESENCE_TIMELINE_AUTH_MODE: ${PRESENCE_TIMELINE_AUTH_MODE:-open}
      PRESENCE_TIMELINE_OPEN_AUTH_FAMILY_SLUG: ${PRESENCE_TIMELINE_OPEN_AUTH_FAMILY_SLUG:-dev-family}
      PRESENCE_TIMELINE_OPEN_AUTH_PARENT_SUBJECT: ${PRESENCE_TIMELINE_OPEN_AUTH_PARENT_SUBJECT:-dev-parent}
      PRESENCE_TIMELINE_DEFAULT_FAMILY_NAME: ${PRESENCE_TIMELINE_DEFAULT_FAMILY_NAME:-Presence Timeline Family}
      PRESENCE_TIMELINE_HOME_ASSISTANT_WS_URL: ${PRESENCE_TIMELINE_HOME_ASSISTANT_WS_URL:-ws://homeassistant.local:8123/api/websocket}
      PRESENCE_TIMELINE_HOME_ASSISTANT_ACCESS_TOKEN: ${PRESENCE_TIMELINE_HOME_ASSISTANT_ACCESS_TOKEN:-replace-me}
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    ports:
      - "${PRESENCE_TIMELINE_API_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  ingestor:
    build:
      context: ./backend
    container_name: presence-timeline-ingestor
    restart: unless-stopped
    environment:
      PRESENCE_TIMELINE_DATABASE_URL: ${PRESENCE_TIMELINE_DATABASE_URL:-postgresql+psycopg://presence_timeline:presence_timeline@db:5432/presence_timeline}
      PRESENCE_TIMELINE_APP_NAME: ${PRESENCE_TIMELINE_APP_NAME:-Presence Timeline API}
      PRESENCE_TIMELINE_APP_VERSION: ${PRESENCE_TIMELINE_APP_VERSION:-0.1.0}
      PRESENCE_TIMELINE_API_V1_PREFIX: ${PRESENCE_TIMELINE_API_V1_PREFIX:-/api/v1}
      PRESENCE_TIMELINE_RETENTION_DAYS: ${PRESENCE_TIMELINE_RETENTION_DAYS:-7}
      PRESENCE_TIMELINE_AUTH_MODE: ${PRESENCE_TIMELINE_AUTH_MODE:-open}
      PRESENCE_TIMELINE_OPEN_AUTH_FAMILY_SLUG: ${PRESENCE_TIMELINE_OPEN_AUTH_FAMILY_SLUG:-dev-family}
      PRESENCE_TIMELINE_OPEN_AUTH_PARENT_SUBJECT: ${PRESENCE_TIMELINE_OPEN_AUTH_PARENT_SUBJECT:-dev-parent}
      PRESENCE_TIMELINE_DEFAULT_FAMILY_NAME: ${PRESENCE_TIMELINE_DEFAULT_FAMILY_NAME:-Presence Timeline Family}
      PRESENCE_TIMELINE_ENABLE_HOME_ASSISTANT_INGESTION: ${PRESENCE_TIMELINE_ENABLE_HOME_ASSISTANT_INGESTION:-false}
      PRESENCE_TIMELINE_HOME_ASSISTANT_BOOTSTRAP_MEMBERS: ${PRESENCE_TIMELINE_HOME_ASSISTANT_BOOTSTRAP_MEMBERS:-[]}
      PRESENCE_TIMELINE_HOME_ASSISTANT_WS_URL: ${PRESENCE_TIMELINE_HOME_ASSISTANT_WS_URL:-ws://homeassistant.local:8123/api/websocket}
      PRESENCE_TIMELINE_HOME_ASSISTANT_ACCESS_TOKEN: ${PRESENCE_TIMELINE_HOME_ASSISTANT_ACCESS_TOKEN:-replace-me}
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    command: python -m app.workers.home_assistant

  geocoder:
    build:
      context: ./backend
    container_name: presence-timeline-geocoder
    restart: unless-stopped
    environment:
      PRESENCE_TIMELINE_DATABASE_URL: ${PRESENCE_TIMELINE_DATABASE_URL:-postgresql+psycopg://presence_timeline:presence_timeline@db:5432/presence_timeline}
      PRESENCE_TIMELINE_ENABLE_REVERSE_GEOCODING: ${PRESENCE_TIMELINE_ENABLE_REVERSE_GEOCODING:-true}
      PRESENCE_TIMELINE_REVERSE_GEOCODE_BATCH_SIZE: ${PRESENCE_TIMELINE_REVERSE_GEOCODE_BATCH_SIZE:-10}
      PRESENCE_TIMELINE_REVERSE_GEOCODE_BACKFILL_LIMIT: ${PRESENCE_TIMELINE_REVERSE_GEOCODE_BACKFILL_LIMIT:-500}
      PRESENCE_TIMELINE_REVERSE_GEOCODE_WORKER_INTERVAL_SECONDS: ${PRESENCE_TIMELINE_REVERSE_GEOCODE_WORKER_INTERVAL_SECONDS:-60}
      PRESENCE_TIMELINE_REVERSE_GEOCODE_RETRY_MINUTES: ${PRESENCE_TIMELINE_REVERSE_GEOCODE_RETRY_MINUTES:-15}
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    command: python -u -m app.workers.reverse_geocoding

volumes:
  presence-timeline-postgis-data:
    external: true
    name: gpstrack_postgis_data
