services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: gpstrack
      POSTGRES_USER: gpstrack
      POSTGRES_PASSWORD: gpstrack
    ports:
      - "${GPSTRACK_DB_PORT:-5432}:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpstrack -d gpstrack"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: ./backend
    container_name: gpstrack-migrator
    environment:
      GPSTRACK_DATABASE_URL: ${GPSTRACK_DATABASE_URL:-postgresql+psycopg://gpstrack:gpstrack@db:5432/gpstrack}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: alembic upgrade head

  api:
    build:
      context: ./backend
    environment:
      GPSTRACK_DATABASE_URL: ${GPSTRACK_DATABASE_URL:-postgresql+psycopg://gpstrack:gpstrack@db:5432/gpstrack}
      GPSTRACK_APP_NAME: ${GPSTRACK_APP_NAME:-GpsTrack API}
      GPSTRACK_APP_VERSION: ${GPSTRACK_APP_VERSION:-0.1.0}
      GPSTRACK_API_V1_PREFIX: ${GPSTRACK_API_V1_PREFIX:-/api/v1}
      GPSTRACK_RETENTION_DAYS: ${GPSTRACK_RETENTION_DAYS:-7}
      GPSTRACK_HOME_ASSISTANT_WS_URL: ${GPSTRACK_HOME_ASSISTANT_WS_URL:-ws://homeassistant.local:8123/api/websocket}
      GPSTRACK_HOME_ASSISTANT_ACCESS_TOKEN: ${GPSTRACK_HOME_ASSISTANT_ACCESS_TOKEN:-replace-me}
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  ingestor:
    build:
      context: ./backend
    environment:
      GPSTRACK_DATABASE_URL: ${GPSTRACK_DATABASE_URL:-postgresql+psycopg://gpstrack:gpstrack@db:5432/gpstrack}
      GPSTRACK_APP_NAME: ${GPSTRACK_APP_NAME:-GpsTrack API}
      GPSTRACK_APP_VERSION: ${GPSTRACK_APP_VERSION:-0.1.0}
      GPSTRACK_API_V1_PREFIX: ${GPSTRACK_API_V1_PREFIX:-/api/v1}
      GPSTRACK_RETENTION_DAYS: ${GPSTRACK_RETENTION_DAYS:-7}
      GPSTRACK_AUTH_MODE: ${GPSTRACK_AUTH_MODE:-open}
      GPSTRACK_OPEN_AUTH_FAMILY_SLUG: ${GPSTRACK_OPEN_AUTH_FAMILY_SLUG:-dev-family}
      GPSTRACK_OPEN_AUTH_PARENT_SUBJECT: ${GPSTRACK_OPEN_AUTH_PARENT_SUBJECT:-dev-parent}
      GPSTRACK_DEFAULT_FAMILY_NAME: ${GPSTRACK_DEFAULT_FAMILY_NAME:-GpsTrack Family}
      GPSTRACK_ENABLE_HOME_ASSISTANT_INGESTION: ${GPSTRACK_ENABLE_HOME_ASSISTANT_INGESTION:-false}
      GPSTRACK_HOME_ASSISTANT_BOOTSTRAP_MEMBERS: ${GPSTRACK_HOME_ASSISTANT_BOOTSTRAP_MEMBERS:-[]}
      GPSTRACK_HOME_ASSISTANT_WS_URL: ${GPSTRACK_HOME_ASSISTANT_WS_URL:-ws://homeassistant.local:8123/api/websocket}
      GPSTRACK_HOME_ASSISTANT_ACCESS_TOKEN: ${GPSTRACK_HOME_ASSISTANT_ACCESS_TOKEN:-replace-me}
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    command: python -m app.workers.home_assistant

volumes:
  postgis_data:
